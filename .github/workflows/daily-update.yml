name: Daily Data Update

on:
  # รันทุกวัน เวลา 08:00 น. (เวลาไทย) = 01:00 UTC
  schedule:
    - cron: '0 1 * * *'
  # สามารถ run manually ได้จาก GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M') (Thai time)"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No changes to commit"
